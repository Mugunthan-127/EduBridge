# Production configuration for Render + Supabase deployment
# SRS v2 §10 — Zero-Investment Deployment Architecture
#
# Copy this file to application-prod.properties and set actual values
# via Render environment variables (never commit secrets to git).

# ── Database (Supabase PostgreSQL) ──────────────────────────────────────────
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate DDL: use 'update' for first deploy, then switch to 'validate'
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ── JWT Security ─────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET}
# 24 hours in milliseconds
jwt.expiration=86400000

# ── Gemini AI (free tier: 15 RPM / 1M TPM) ───────────────────────────────────
gemini.api.key=${GEMINI_API_KEY}

# ── Server ───────────────────────────────────────────────────────────────────
server.port=8080

# ── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.edubridge=INFO
logging.level.org.springframework.security=WARN

# ── Disable H2 console in production ─────────────────────────────────────────
spring.h2.console.enabled=false

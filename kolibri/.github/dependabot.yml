# Automatically update versions for npm
version: 2
updates:
  # Maintain dependencies for Javascript
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
      time: "00:00"
    open-pull-requests-limit: 10
    cooldown:
      default-days: 7
      exclude:
        - kolibri-constants
        - kolibri-design-system
    groups:
      babel:
        patterns:
          - "@babel/*"
      khanacademy:
        patterns:
          - "@khanacademy/*"
      jest:
        patterns:
          - "jest*"
  # Maintain dependencies for Python (uv)
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "monthly"
      time: "00:00"
    cooldown:
      default-days: 7
  # Maintain dependencies for Github Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      time: "00:00"
    cooldown:
      default-days: 7
    groups:
      github:
        patterns:
          - "actions/*"

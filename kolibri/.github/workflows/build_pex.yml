name: Build PEX file
on:
  workflow_call:
    inputs:
      whl-file-name:
        required: true
        type: string
    outputs:
      pex-file-name:
        description: "PEX file name"
        value: ${{ jobs.build_pex.outputs.pex-file-name }}
permissions:
  contents: read
jobs:
  build_pex:
    name: Build PEX
    runs-on: ubuntu-latest
    outputs:
      pex-file-name: ${{ steps.get-pex-filename.outputs.pex-file-name }}
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-python: true
      - uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.whl-file-name }}
          path: dist
      - name: Build PEX
        run: make pex
      - name: Get PEX filename
        id: get-pex-filename
        run: echo "pex-file-name=$(basename dist/*.pex)" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.get-pex-filename.outputs.pex-file-name }}
          path: dist/${{ steps.get-pex-filename.outputs.pex-file-name }}

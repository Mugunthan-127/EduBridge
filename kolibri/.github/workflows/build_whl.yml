name: Build WHL file
on:
  workflow_call:
    outputs:
      whl-file-name:
        description: "WHL file name"
        value: ${{ jobs.build_whl.outputs.whl-file-name }}
      tar-file-name:
        description: "TAR file name"
        value: ${{ jobs.build_whl.outputs.tar-file-name }}
permissions:
  contents: read
jobs:
  build_whl:
    name: Build WHL
    runs-on: ubuntu-latest
    outputs:
      whl-file-name: ${{ steps.get-whl-filename.outputs.whl-file-name }}
      tar-file-name: ${{ steps.get-tar-filename.outputs.tar-file-name }}
    steps:
      - name: Install Ubuntu dependencies
        run: |
          sudo apt-get -y -qq update
          sudo apt-get install -y gettext sqlite3 binutils-aarch64-linux-gnu binutils-arm-linux-gnueabihf
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
          lfs: true
      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-python: true
      - name: Install pnpm
        uses: pnpm/action-setup@v6.0.9
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: 'package.json'
          cache: 'pnpm'
      - name: Install Javascript dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Python dependencies
        run: uv sync --group dev
      # Restore the webpack filesystem cache so PR builds only recompile their
      # own diff. The unique key always misses (forcing a fresh save at job end),
      # while restore-keys pulls the most recent cache for the same lockfile —
      # primed on `develop` by warm_build_cache.yml so fork PRs get a hit too.
      - name: Cache webpack build
        uses: actions/cache@v6.1.0
        with:
          path: node_modules/.cache/webpack
          key: webpack-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            webpack-${{ hashFiles('pnpm-lock.yaml') }}-
      # The bundled C extensions are pinned wheels that change only when the
      # cext requirements change, so an exact-match key is enough — no re-download
      # once `develop` has primed it. `.cext_cache` is the pip cache dir that the
      # `staticdeps-cext` Makefile target writes to (via --cache-path).
      - name: Cache C extension downloads
        uses: actions/cache@v6.1.0
        with:
          path: .cext_cache
          key: cext-${{ hashFiles('requirements/cext.txt', 'requirements/cext_noarch.txt') }}
      - name: Build Kolibri
        run: make dist
      - name: Get WHL filename
        id: get-whl-filename
        run: echo "whl-file-name=$(basename dist/*.whl)" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.get-whl-filename.outputs.whl-file-name }}
          path: dist/${{ steps.get-whl-filename.outputs.whl-file-name }}
      - name: Get TAR filename
        id: get-tar-filename
        run: echo "tar-file-name=$(basename dist/*.tar.gz)" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.get-tar-filename.outputs.tar-file-name }}
          path: dist/${{ steps.get-tar-filename.outputs.tar-file-name }}

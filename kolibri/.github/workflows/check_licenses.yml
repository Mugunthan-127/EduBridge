name: Licenses
on:
  push:
    branches:
      - develop
      - 'release-v**'
  pull_request:
    branches:
      - develop
      - 'release-v**'
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true
permissions:
  contents: read
  actions: read
jobs:
  pre_job:
    name: Path match check
    runs-on: ubuntu-latest
    # Map a step output to a job output
    outputs:
      should_skip: ${{ steps.skip_check.outputs.should_skip }}
    steps:
      - id: skip_check
        uses: fkirc/skip-duplicate-actions@master
        with:
          github_token: ${{ github.token }}
          paths: '["requirements/*.txt", "pyproject.toml", "uv.lock", "package.json", "**/package.json", "pnpm-lock.yaml", "test/conditional/test_licenses.sh", ".github/workflows/check_licenses.yml"]'
  licenses:
    name: Licenses check
    needs: pre_job
    if: ${{ needs.pre_job.outputs.should_skip != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Install pnpm
        uses: pnpm/action-setup@v6.0.9
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: 'package.json'
          cache: 'pnpm'
      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
      - name: Install dependencies
        run: |
          # Use an isolated virtual environment so the license check only sees
          # packages explicitly installed for Kolibri -- the bundled `base`
          # dependency group from pyproject.toml.
          uv venv ./virtualenv_dir --python 3.11
          source ./virtualenv_dir/bin/activate
          uv pip install --group base
          pnpm install --frozen-lockfile
          pnpm rebuild node-sass
      - name: Check Licenses
        run: ./test/conditional/test_licenses.sh

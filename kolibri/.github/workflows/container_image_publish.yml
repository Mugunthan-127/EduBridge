name: Publish Container Image
on:
  workflow_call:
    inputs: &workflow_inputs
      release-tag:
        description: Release tag to publish (for example, v0.19.2)
        required: true
        type: string
      tag-latest:
        description: Tag the image as 'latest'
        required: false
        type: boolean
    secrets:
      DOCKERHUB_TOKEN:
        required: true
  workflow_dispatch:
    inputs: *workflow_inputs
env:
  IMAGE_NAME: ${{ github.repository }}
permissions:
  contents: read
  packages: write
  id-token: write
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
    steps:
      - name: Parse Kolibri version
        id: parse-version
        run: |
          tag='${{ inputs.release-tag }}'
          echo "kolibri_version=${tag#v}" >> "$GITHUB_OUTPUT"
      - name: Checkout repository
        uses: actions/checkout@v7.0.0
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4.1.0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0
      - name: Log in to Docker Hub Registry
        uses: docker/login-action@v4.2.0
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          scope: '${{ env.IMAGE_NAME }}@push'
      - name: Log in to Github Container Registry
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v6.1.0
        env:
          DOCKER_METADATA_ANNOTATIONS_LEVELS: manifest,index
        with:
          images: |
            docker.io/${{ env.IMAGE_NAME }}
            ghcr.io/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ steps.parse-version.outputs.kolibri_version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.parse-version.outputs.kolibri_version }}
            type=raw,value=latest,enable=${{ inputs.tag-latest }}
      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v7.2.0
        with:
          context: ./docker
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          build-args: |
            KOLIBRI_VERSION=${{ steps.parse-version.outputs.kolibri_version }}
            KOLIBRI_VERSION_SPEC===${{ steps.parse-version.outputs.kolibri_version }}
      - name: Generate Docker Hub artifact attestation
        uses: actions/attest@v4.1.0
        with:
          subject-name: index.docker.io/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
      - name: Generate Github artifact attestation
        uses: actions/attest@v4.1.0
        with:
          subject-name: ghcr.io/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

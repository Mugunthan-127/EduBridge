name: Morango Integration Tests
on:
  schedule:
    - cron: '0 0 * * 0'
  pull_request:
    branches:
      - develop
      - release-*
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true
permissions:
  contents: read
  actions: read
jobs:
  pre_job:
    name: Path match check
    runs-on: ubuntu-latest
    outputs:
      should_skip: ${{ steps.skip_check.outputs.should_skip }}
    steps:
      - id: skip_check
        uses: fkirc/skip-duplicate-actions@master
        with:
          github_token: ${{ github.token }}
          paths: '["pyproject.toml", "uv.lock", ".github/workflows/morango_integration.yml", "kolibri/core/auth/**/*.py"]'
  morango_integration_tests_sqlite:
    name: Morango Integration Tests for uv-supported Python versions
    needs: pre_job
    if: needs.pre_job.outputs.should_skip != 'true'
    runs-on: ubuntu-latest
    env:
      INTEGRATION_TEST: 'true'
    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12', '3.13', '3.14']
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-python: true
      - name: Install Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          uv sync --group test --python ${{ matrix.python-version }}
          uv pip install -e .
      - name: Test with pytest
        run: uv run pytest kolibri/core/auth/test/test_morango_integration.py
  morango_integration_tests_sqlite_no_uv:
    name: Morango Integration Tests for Python versions without uv support
    needs: pre_job
    if: needs.pre_job.outputs.should_skip != 'true'
    runs-on: ubuntu-latest
    env:
      INTEGRATION_TEST: 'true'
      PYTHONPATH: /home/runner/work/kolibri/kolibri
      KOLIBRI_HOME: /tmp/.kolibri
      DJANGO_SETTINGS_MODULE: kolibri.deployment.default.settings.test
      KOLIBRI_RUN_MODE: test
      SKIP_PY_CHECK: "1"
    strategy:
      matrix:
        python-version: [3.6, 3.7]
    container:
      image: python:${{ matrix.python-version }}-buster
    steps:
      - name: Fix apt sources for archived Buster repos
        run: |
          echo "deb http://archive.debian.org/debian-archive/debian/ buster main" > /etc/apt/sources.list
          echo "deb http://archive.debian.org/debian-archive/debian-security/ buster/updates main" >> /etc/apt/sources.list
          echo 'Acquire::Check-Valid-Until "false";' > /etc/apt/apt.conf.d/99archive
          apt-get -y -qq update
          apt-get install -y git git-lfs
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
      # The buster container runs as root but the checkout is owned by the
      # runner user, so git refuses to operate without this.
      - name: Fix git safe directory
        run: git config --global --add safe.directory /__w/kolibri/kolibri
      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
      - name: Install dependencies
        run: |
          uv pip install --system --group base --group test
          uv pip install --system -r requirements/cext.txt
          make set-no-uv-python-version-for-tests
          # Create a kolibri CLI wrapper since pip install -e . can't work on 3.6
          # (build backend requires Python 3.8+). The morango integration tests
          # spawn kolibri as a subprocess.
          echo '#!/usr/bin/env python' > /usr/local/bin/kolibri
          echo 'from kolibri.utils.cli import main; main()' >> /usr/local/bin/kolibri
          chmod +x /usr/local/bin/kolibri
      - name: Test with pytest
        run: python -m pytest kolibri/core/auth/test/test_morango_integration.py
  morango_integration_tests_postgres:
    name: Morango Integration Tests with PostgreSQL
    needs: pre_job
    if: needs.pre_job.outputs.should_skip != 'true'
    runs-on: ubuntu-latest
    env:
      INTEGRATION_TEST: 'true'
    services:
      # Label used to access the service container
      postgres:
        # Docker Hub image
        image: postgres:16
        # Provide the password for postgres
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test
        # Set health checks to wait until postgres has started
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
        ports:
          # Maps tcp port 5432 on service container to the host
          - 5432:5432
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-python: true
      - name: Install Python 3.9
        run: uv python install 3.9
      - name: Install dependencies
        run: uv sync --group test --extra postgres --python 3.9
      - name: Test with pytest
        run: uv run pytest kolibri/core/auth/test/test_morango_integration.py
        env:
          KOLIBRI_DATABASE_ENGINE: postgres
          KOLIBRI_DATABASE_USER: postgres
          KOLIBRI_DATABASE_NAME: test
          KOLIBRI_DATABASE_HOST: localhost
          KOLIBRI_DATABASE_PASSWORD: postgres
          KOLIBRI_DATABASE_PORT: "5432"

name: No zombie threads
on:
  push:
    branches:
      - develop
      - 'release-v**'
  pull_request:
    branches:
      - develop
      - 'release-v**'
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true
permissions:
  contents: read
  actions: read
jobs:
  pre_job:
    name: Path match check
    runs-on: ubuntu-latest
    # Map a step output to a job output
    outputs:
      should_skip: ${{ steps.skip_check.outputs.should_skip }}
    steps:
      - id: skip_check
        uses: fkirc/skip-duplicate-actions@master
        with:
          github_token: ${{ github.token }}
          paths: '["kolibri/**/*.py", "pyproject.toml", "uv.lock"]'
  zombies:
    name: No zombies
    needs: pre_job
    if: ${{ needs.pre_job.outputs.should_skip != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-python: true
      - name: Install Python 3.11
        run: uv python install 3.11
      - name: Install dependencies
        run: |
          uv sync --group base --python 3.11
          uv pip install -r requirements/cext.txt
      - name: Check proper shutdown
        run: |
          # ensure kolibri stops within 20 seconds 10 times in a row
          # --no-sync: don't re-resolve the env (would drop the cext deps installed above)
          uv run --no-sync ./test/ensure_kolibri_stops_within_time.sh 20 10 8082 8083
          uv run --no-sync ./test/ensure_no_kolibris_running_on_port.sh 8082
          uv run --no-sync ./test/ensure_no_kolibris_running_on_port.sh 8083

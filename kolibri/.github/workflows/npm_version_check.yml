name: npm Package Version Check
on:
  pull_request:
    paths:
      - 'packages/**'
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true
permissions:
  contents: read
  pull-requests: read
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version-file: 'package.json'
      - name: Generate version report
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const utils = require('./.github/githubUtils.js');
            const base = context.payload.pull_request.base.sha;
            const data = utils.generateNpmVersionData(base);
            fs.mkdirSync('npm_version_report', { recursive: true });
            fs.writeFileSync('npm_version_report/data.json', JSON.stringify(data));
      - uses: actions/upload-artifact@v7
        with:
          name: npm_version_report
          path: npm_version_report/

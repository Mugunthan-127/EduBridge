name: npm Package Version Comment
on:
  workflow_run:
    workflows: [npm Package Version Check]
    types:
      - completed
permissions:
  contents: read
  pull-requests: write
  actions: read
jobs:
  comment:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Find PR by head SHA
        id: find-pr
        uses: actions/github-script@v9
        with:
          script: |
            const utils = require('./.github/githubUtils.js')
            const prNumber = await utils.findPrByHeadSha(github, context)
            if (!prNumber) {
              core.notice('No open PR found for head SHA; skipping comment')
              core.setOutput('found', 'false')
              return null
            }
            core.setOutput('found', 'true')
            return prNumber
      - name: Download report artifact
        if: steps.find-pr.outputs.found == 'true'
        uses: actions/download-artifact@v8
        with:
          name: npm_version_report
          path: ${{ runner.temp }}/npm_version_report
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ github.event.workflow_run.id }}
      - name: Post or update comment
        if: steps.find-pr.outputs.found == 'true'
        uses: actions/github-script@v9
        env:
          PR_NUMBER: ${{ steps.find-pr.outputs.result }}
          REPORT_DIR: ${{ runner.temp }}/npm_version_report
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const utils = require('./.github/githubUtils.js');
            const raw = fs.readFileSync(path.join(process.env.REPORT_DIR, 'data.json'), 'utf8');
            let data;
            try {
              data = utils.validateNpmVersionData(raw);
            } catch (e) {
              core.setFailed(`Invalid version data JSON: ${e.message}`);
              return;
            }
            const body = data ? utils.renderNpmVersionMarkdown(data) : null;
            const prNumber = Number(process.env.PR_NUMBER);
            await utils.postNpmVersionComment(github, context, prNumber, body);

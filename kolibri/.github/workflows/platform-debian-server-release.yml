name: Release kolibri-server
on:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  check_version:
    name: Resolve and validate the release version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
    steps:
      - name: Checkout codebase
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-python: true
      - name: Install the workspace so kolibri resolves from it
        run: uv sync --all-packages
      - name: Resolve and validate the Kolibri version
        id: kolibri
        run: |
          VERSION=$(uv run python -c "import kolibri; print(kolibri.__version__)")
          echo "Resolved Kolibri version: ${VERSION}"
          # Only ever publish a real release or pre-release to Launchpad — never a
          # dev/local build (.dev / +git / +local), which must not reach the PPA.
          case "${VERSION}" in
            *.dev* | *+*)
              echo "::error::Refusing to publish a non-release Kolibri version: ${VERSION}"
              exit 1
              ;;
          esac
          echo "KOLIBRI_VERSION=${VERSION}" >> "$GITHUB_OUTPUT"
      - name: Generate the changelog from the Kolibri version
        working-directory: platforms/debian-server
        env:
          KOLIBRI_VERSION: ${{ steps.kolibri.outputs.KOLIBRI_VERSION }}
        run: make changelog
      - name: Extract the Debian version from the changelog
        id: version
        working-directory: platforms/debian-server
        run: |
          VERSION=$(dpkg-parsechangelog -S Version)
          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Debian version: ${VERSION}"
  build_package:
    runs-on: ubuntu-latest
    needs: check_version
    steps:
      - name: Checkout codebase
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-python: true
      - name: Install the workspace so kolibri resolves from it
        run: uv sync --all-packages
      - name: Generate the changelog targeting the runner series
        working-directory: platforms/debian-server
        run: |
          SERIES=$(. /etc/os-release && echo "$VERSION_CODENAME")
          echo "Targeting series: ${SERIES}"
          DISTRIBUTION="$SERIES" make changelog
      - name: Install build and upload dependencies
        working-directory: platforms/debian-server
        run: make install-upload-deps
      - name: Install Kolibri
        working-directory: platforms/debian-server
        run: make install-kolibri
      - name: Write Launchpad credentials
        env:
          LP_CREDENTIALS: ${{ secrets.LP_CREDENTIALS }}
        run: |
          echo "$LP_CREDENTIALS" > /tmp/lp-creds.txt
      - name: Check if source already uploaded
        id: check_source
        working-directory: platforms/debian-server
        env:
          LP_CREDENTIALS_FILE: /tmp/lp-creds.txt
        run: |
          if python3 scripts/launchpad_copy.py check-source \
            --package kolibri-server \
            --version "${{ needs.check_version.outputs.version }}"; then
            echo "already_uploaded=true" >> "$GITHUB_OUTPUT"
          else
            echo "already_uploaded=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Import GPG key
        if: steps.check_source.outputs.already_uploaded != 'true'
        run: |
          echo -n "${{ secrets.GPG_SIGNING_KEY }}" | base64 --decode | gpg --import --no-tty --batch --yes
          echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          gpgconf --kill gpg-agent
          # Extract key ID from imported key so we don't need a separate secret
          GPG_KEY_ID=$(gpg --list-secret-keys --keyid-format long --with-colons | grep ^sec | head -1 | cut -d: -f5)
          echo "GPG_KEY_ID=$GPG_KEY_ID" >> "$GITHUB_ENV"
          echo "Imported GPG key: $GPG_KEY_ID"
      - name: Sign and upload package
        if: steps.check_source.outputs.already_uploaded != 'true'
        working-directory: platforms/debian-server
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: make sign-and-upload
      - name: Cleanup credentials
        if: always()
        run: rm -f /tmp/lp-creds.txt /tmp/.gpg-passphrase
  wait_for_source_published:
    needs:
      - check_version
      - build_package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout codebase
        uses: actions/checkout@v7
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-launchpadlib
      - name: Write Launchpad credentials
        env:
          LP_CREDENTIALS: ${{ secrets.LP_CREDENTIALS }}
        run: |
          echo "$LP_CREDENTIALS" > /tmp/lp-creds.txt
      - name: Wait for published binaries in source series
        working-directory: platforms/debian-server
        env:
          LP_CREDENTIALS_FILE: /tmp/lp-creds.txt
        run: |
          SERIES=$(. /etc/os-release && echo "$VERSION_CODENAME")
          python3 scripts/launchpad_copy.py wait-for-published \
            --package kolibri-server \
            --version "${{ needs.check_version.outputs.version }}" \
            --series "$SERIES"
      - name: Cleanup Launchpad credentials
        if: always()
        run: rm -f /tmp/lp-creds.txt
  copy_to_other_distributions:
    needs: wait_for_source_published
    runs-on: ubuntu-latest
    steps:
      - name: Checkout codebase
        uses: actions/checkout@v7
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-launchpadlib
      - name: Write Launchpad credentials
        env:
          LP_CREDENTIALS: ${{ secrets.LP_CREDENTIALS }}
        run: |
          echo "$LP_CREDENTIALS" > /tmp/lp-creds.txt
      - name: Copy to other supported series
        working-directory: platforms/debian-server
        env:
          LP_CREDENTIALS_FILE: /tmp/lp-creds.txt
        run: |
          python3 scripts/launchpad_copy.py copy-to-series
      - name: Cleanup Launchpad credentials
        if: always()
        run: rm -f /tmp/lp-creds.txt
  wait_for_copies_published:
    needs:
      - check_version
      - copy_to_other_distributions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout codebase
        uses: actions/checkout@v7
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-launchpadlib
      - name: Write Launchpad credentials
        env:
          LP_CREDENTIALS: ${{ secrets.LP_CREDENTIALS }}
        run: |
          echo "$LP_CREDENTIALS" > /tmp/lp-creds.txt
      - name: Wait for published binaries in all series
        working-directory: platforms/debian-server
        env:
          LP_CREDENTIALS_FILE: /tmp/lp-creds.txt
        run: |
          python3 scripts/launchpad_copy.py wait-for-published \
            --package kolibri-server \
            --version "${{ needs.check_version.outputs.version }}"
      - name: Cleanup Launchpad credentials
        if: always()
        run: rm -f /tmp/lp-creds.txt
  block_release_step:
    name: Job to block publish of a release until it has been manually approved
    needs:
      - wait_for_copies_published
    runs-on: ubuntu-latest
    environment: release
    steps:
      - run: echo "Release approved — proceeding to promote to kolibri PPA."
  copy_package_from_proposed_to_ppa:
    name: Promote packages from kolibri-proposed to kolibri
    needs:
      - check_version
      - block_release_step
    runs-on: ubuntu-latest
    steps:
      - name: Checkout codebase
        uses: actions/checkout@v7
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-launchpadlib
      - name: Write Launchpad credentials
        env:
          LP_CREDENTIALS: ${{ secrets.LP_CREDENTIALS }}
        run: |
          echo "$LP_CREDENTIALS" > /tmp/lp-creds.txt
      - name: Copy package from kolibri-proposed to kolibri
        working-directory: platforms/debian-server
        env:
          LP_CREDENTIALS_FILE: /tmp/lp-creds.txt
        run: |
          python3 scripts/launchpad_copy.py promote \
            --version "${{ needs.check_version.outputs.version }}"
      - name: Wait for promoted packages to be published
        working-directory: platforms/debian-server
        env:
          LP_CREDENTIALS_FILE: /tmp/lp-creds.txt
        run: |
          python3 scripts/launchpad_copy.py wait-for-published \
            --package kolibri-server \
            --version "${{ needs.check_version.outputs.version }}" \
            --ppa kolibri
      - name: Cleanup Launchpad credentials
        if: always()
        run: rm -f /tmp/lp-creds.txt
